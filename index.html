<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100+ Frontend Projects | Irfaan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Top Glowing Badge */
        .journey-badge { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #3b82f6; } to { box-shadow: 0 0 15px #3b82f6; } }
        
        /* Glass Effect */
        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        /* होHover Effect */
        .project-card, .coming-soon-card { transition: all 0.3s ease; }
        .project-card:hover, .coming-soon-card:hover { 
            border-color: #38bdf8; 
            transform: translateY(-5px); 
            background: rgba(30, 41, 59, 0.9);
        }
        
        /* Number of Badges */
        .number-badge {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen flex flex-col">
    
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="container mx-auto px-6 py-16 flex-grow">
        <header class="max-w-4xl mx-auto text-center mb-16">
            <span class="journey-badge px-5 py-1.5 rounded-full bg-blue-500/10 text-blue-400 text-[10px] font-bold tracking-widest uppercase mb-6 inline-block border border-blue-500/30">
                🚀 My Learning Journey
            </span>
            
            <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6 tracking-tight">
                100+ <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Frontend Projects</span>
            </h1>
            
            <p class="text-slate-400 text-base md:text-lg max-w-2xl mx-auto">
                मेरे कोडिंग सफर के शुरुआती <span class="text-white font-semibold">105</span> बेहतरीन HTML, CSS और JS प्रोजेक्ट्स का संग्रह।
            </p>
        </header>

        <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>
    </div>

    <footer class="w-full py-10 border-t border-slate-800 bg-[#020617] text-center">
        <p class="text-slate-500 text-sm">
            © 2026 <span class="text-white font-semibold">Irfaan Mansoori</span>. All Rights Reserved.
        </p>
        <p class="text-slate-600 text-[9px] mt-2 uppercase tracking-[0.3em]">Built for Portfolio Showcase</p>
    </footer>

    <script>
        const grid = document.getElementById('project-grid');
        const totalProjects = 105; 

        // Generate Card For Project
        for (let i = 1; i <= totalProjects; i++) {
            let num = i < 10 ? `0${i}` : i;
            let folderName = `Project ${num}`;
            
            grid.innerHTML += `
                <a href="${folderName}/index.html" class="project-card glass p-6 rounded-2xl group flex flex-col justify-between h-44">
                    <div class="flex justify-between items-start">
                        <div class="number-badge px-3 py-1 rounded-lg text-sm font-bold">
                            #${num}
                        </div>
                        <div class="text-slate-500 group-hover:text-blue-400 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-white mb-1 group-hover:text-blue-400 transition-colors">${folderName}</h3>
                        <p class="text-blue-400/70 text-[11px] font-medium tracking-wide">Click here for Live Demo →</p>
                    </div>
                </a>
            `;
        }

        // Comming Soon....
        grid.innerHTML += `
            <div class="coming-soon-card glass p-6 rounded-2xl flex flex-col justify-center items-center h-44 border-dashed border-2 border-slate-700 bg-slate-900/10 text-center group cursor-default">
                <div class="text-slate-600 group-hover:text-blue-400 mb-2 font-bold text-xl animate-pulse">+</div>
                <h3 class="text-lg font-bold text-slate-500 group-hover:text-slate-300 italic font-mono">Coming Soon</h3>
                <p class="text-slate-600 group-hover:text-slate-400 text-[10px] mt-1">More projects arriving...</p>
            </div>
        `;
    </script>
</body>
</html>
